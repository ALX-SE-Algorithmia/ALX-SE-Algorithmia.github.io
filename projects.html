<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>We Have Moved - Algorithmia SE</title>
    <meta http-equiv="refresh" content="30;url=https://algorithmia-se.com">
    <link rel="icon" href="./images/website-logos/index-logo.jpg" type="image/jpg" />
    <link href="https://fonts.googleapis.com/css2?family=Bentham&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #07303e;
            --primary: #ff7b1b;
            --text: white;
        }

        body, html {
            margin: 0;
            padding: 0;
            height: 100%;
            overflow: hidden; /* Strictly prevent scrolling */
        }

        body {
            font-family: "Bentham", serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .header-background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: linear-gradient(
                90deg,
                rgba(6, 47, 61, 0.8),
                rgba(255, 123, 27, 0.4),
                rgba(255, 123, 27, 0.4),
                rgba(116, 64, 225, 0.4)
            );
            filter: blur(200px);
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            z-index: 10;
            padding: 1rem;
            max-width: 90vw;
            box-sizing: border-box;
        }

        .logo {
            width: clamp(60px, 10vw, 80px);
            height: auto;
            margin-bottom: 1rem;
        }

        h1 {
            font-size: clamp(2rem, 6vw, 3.5rem);
            color: var(--primary);
            margin: 0 0 0.5rem 0;
        }

        p {
            font-size: clamp(1.1rem, 3vw, 1.4rem);
            line-height: 1.4;
            margin: 0 0 1.5rem 0;
        }

        .timer-container {
            font-size: clamp(4rem, 12vw, 6rem);
            font-weight: bold;
            color: var(--primary);
            margin-bottom: 2rem;
            text-shadow: 0 0 20px rgba(255, 123, 27, 0.5);
        }

        .btn {
            background-color: var(--primary);
            color: white;
            text-decoration: none;
            padding: 14px 32px;
            border-radius: 30px;
            font-size: clamp(1rem, 2.5vw, 1.2rem);
            display: inline-block;
            transition: all 0.3s ease;
            border: none;
            cursor: pointer;
        }

        .btn:hover {
            background-color: white;
            color: var(--primary);
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="header-background"></div>

    <div class="container">
        <img src="./images/website-logos/logo.svg" alt="Algorithmia SE Logo" class="logo" onerror="this.src='https://algorithmia-se.com/favicon.ico'">
        <h1>We Have Moved 🌍</h1>
        <p>Redirecting you to our new home...</p>
        
        <div class="timer-container" id="countdown">30</div>

        <a href="https://algorithmia-se.com" class="btn">Take Me There Now</a>
    </div>

    <script>
        let timeLeft = 30;
        const countdownEl = document.getElementById('countdown');

        const timerId = setInterval(() => {
            timeLeft--;
            countdownEl.textContent = timeLeft;

            if (timeLeft <= 0) {
                clearInterval(timerId);
                window.location.href = 'https://algorithmia-se.com';
            }
        }, 1000);
    </script>
</body>
</html>
